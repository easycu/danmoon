<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorthand Master Pro</title>
    <style>
        :root { 
            --primary: #4a90e2; 
            --secondary: #f0f4f8;
            --accent: #2ecc71;
            --text: #333;
            --bg: #f5f7fa; 
        }
        
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
        }

        .container { 
            width: 100%; 
            max-width: 850px; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }

        h1 { text-align: center; font-size: 1.8rem; margin-bottom: 30px; color: var(--primary); }

        .admin-section { border-bottom: 2px solid #f0f0f0; padding-bottom: 30px; margin-bottom: 30px; }
        #sentence-input { 
            width: 100%; height: 100px; padding: 15px; border: 1.5px solid #ddd; 
            border-radius: 10px; font-size: 16px; resize: none; box-sizing: border-box;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        button { 
            cursor: pointer; padding: 12px 20px; border: none; border-radius: 8px; 
            font-weight: 600; transition: all 0.2s; font-size: 14px;
        }
        .btn-add { background: var(--primary); color: white; }
        .btn-list { background: #6c757d; color: white; }
        .btn-start { background: var(--accent); color: white; flex-grow: 1; font-size: 16px; }

        #sentence-list { 
            margin-top: 20px; max-height: 200px; overflow-y: auto; 
            background: var(--secondary); padding: 15px; border-radius: 10px;
        }
        .item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 8px 0; border-bottom: 1px solid #e0e0e0;
        }
        .del-btn { background: #ff7675; color: white; padding: 5px 10px; font-size: 11px; }

        .practice-section { display: none; text-align: center; }
        .display-sentence { 
            font-size: 26px; margin: 40px 0; line-height: 1.8; word-break: keep-all; 
            min-height: 80px; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 4px;
        }

        .display-sentence b {
            color: #fff;
            background-color: var(--primary);
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 700;
            display: inline-block;
            margin: 0 1px;
        }

        #practice-input { 
            width: 100%; font-size: 22px; padding: 15px; border: 3px solid var(--primary); 
            border-radius: 12px; box-sizing: border-box; text-align: center; outline: none;
        }

        .stats { 
            margin-top: 30px; display: flex; justify-content: center; gap: 40px; 
            font-size: 18px; color: #555;
        }
        .stat-val { font-weight: 800; color: var(--primary); }
        .badge { background: #ffeaa7; padding: 5px 15px; border-radius: 50px; font-weight: bold; font-size: 14px; }
        .guide-text { color: #999; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Shorthand Typing Master</h1>

    <div id="admin-view" class="admin-section">
        <textarea id="sentence-input" placeholder="연습 문장을 입력하세요. **약어** 처럼 별표 두 개로 감싸면 각각의 박스로 표시됩니다."></textarea>
        <div class="btn-group">
            <button class="btn-add" onclick="saveSentence()">문장 저장</button>
            <button class="btn-list" onclick="toggleList()">목록 보기/닫기</button>
            <button class="btn-start" onclick="startPractice()">연습 시작하기 ▶</button>
        </div>
        <div id="sentence-list" style="display:none;"></div>
    </div>

    <div id="practice-view" class="practice-section">
        <span class="badge" id="repeat-info">준비 완료</span>
        <div id="target-sentence" class="display-sentence"></div>
        <input type="text" id="practice-input" autocomplete="off" placeholder="문장을 치고 Enter 또는 Space를 누르세요" onkeydown="handleKeyDown(event)" oninput="startTimer()">
        <p class="guide-text">완료 후 [엔터] 또는 [스페이스바]를 누르면 다음으로 넘어갑니다.</p>
        <div class="stats">
            <div>속도: <span class="stat-val" id="cpm">0</span> CPM</div>
            <div>진행: <span class="stat-val" id="progress">0</span> / <span id="goal">0</span></div>
        </div>
        <button class="btn-list" style="margin-top:30px" onclick="stopPractice()">연습 중단</button>
    </div>
</div>

<script>
    let sentences = JSON.parse(localStorage.getItem('sh_data')) || [];
    let currentIdx = -1;
    let repeatGoal = 0;
    let currentRepeat = 0;
    let startTime = null;

    function saveSentence() {
        const input = document.getElementById('sentence-input');
        let text = input.value.trim();
        if(!text) return;
        let formatted = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        sentences.push(formatted);
        localStorage.setItem('sh_data', JSON.stringify(sentences));
        input.value = '';
        renderList();
        alert('저장되었습니다.');
    }

    function renderList() {
        const listDiv = document.getElementById('sentence-list');
        listDiv.innerHTML = sentences.length ? '' : '<p style="text-align:center; color:#999;">등록된 문장이 없습니다.</p>';
        sentences.forEach((s, i) => {
            const item = document.createElement('div');
            item.className = 'item';
            item.innerHTML = `<span>${i+1}. ${s}</span><button class="del-btn" onclick="deleteSentence(${i})">삭제</button>`;
            listDiv.appendChild(item);
        });
    }

    function deleteSentence(i) {
        if(confirm('이 문장을 삭제할까요?')) {
            sentences.splice(i, 1);
            localStorage.setItem('sh_data', JSON.stringify(sentences));
            renderList();
        }
    }

    function toggleList() {
        const listDiv = document.getElementById('sentence-list');
        listDiv.style.display = listDiv.style.display === 'none' ? 'block' : 'none';
        renderList();
    }

    function startPractice() {
        if(!sentences.length) return alert('먼저 문장을 추가해주세요!');
        document.getElementById('admin-view').style.display = 'none';
        document.getElementById('practice-view').style.display = 'block';
        pickRandomSentence();
    }

    function pickRandomSentence() {
        currentIdx = Math.floor(Math.random() * sentences.length);
        currentRepeat = 0;
        repeatGoal = 0; 
        initLap();
    }

    function initLap() {
        document.getElementById('target-sentence').innerHTML = sentences[currentIdx];
        const inputField = document.getElementById('practice-input');
        inputField.value = '';
        inputField.focus();
        document.getElementById('repeat-info').innerText = repeatGoal === 0 ? "기록 측정 시도" : `${repeatGoal - currentRepeat}번 더 반복`;
        document.getElementById('progress').innerText = currentRepeat;
        document.getElementById('goal').innerText = repeatGoal === 0 ? "?" : repeatGoal;
        startTime = null;
    }

    function startTimer() {
        if(!startTime) startTime = new Date();
        
        // 실시간 타수 업데이트
        const currentVal = document.getElementById('practice-input').value;
        const elapsed = (new Date() - startTime) / 1000 / 60;
        const cpm = Math.floor(currentVal.length / elapsed);
        document.getElementById('cpm').innerText = isFinite(cpm) ? cpm : 0;
    }

    // 엔터 또는 스페이스바 감지
    function handleKeyDown(event) {
        if (event.key === 'Enter' || event.code === 'Space') {
            const inputField = document.getElementById('practice-input');
            const targetText = document.getElementById('target-sentence').innerText.trim();
            const currentVal = inputField.value.trim();

            // 내용이 일치하는지 확인
            if (currentVal === targetText) {
                event.preventDefault(); // 스페이스/엔터 입력 방지
                const finalCpm = parseInt(document.getElementById('cpm').innerText);
                handleComplete(finalCpm);
            }
        }
    }

    function handleComplete(speed) {
        if(currentRepeat === 0) {
            if(speed < 300) repeatGoal = 10;
            else if(speed < 700) repeatGoal = 5;
            else repeatGoal = 3;
        }

        currentRepeat++;

        if(currentRepeat >= repeatGoal) {
            alert(`목표 달성! (${speed}타) 다음 문장으로 이동합니다.`);
            pickRandomSentence();
        } else {
            initLap();
        }
    }

    function stopPractice() {
        document.getElementById('admin-view').style.display = 'block';
        document.getElementById('practice-view').style.display = 'none';
    }
</script>
</body>
</html>
